<script type="module" type="text/javascript" src="modules/videos/js/main.js"></script>
<script type="text/javascript"src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

<!-- PAGE MAIN CONTENT -->
<div class="container is-fluid columns is-centered py-6">
  <aside class="column is-2 menu">
    <button class="button is-light mt-2 mb-5 is-fullwidth" id="open_servers_modal_btn">
      <span class="icon"><i class="fas fa-server"></i></span>
      <span>Remote Servers</span>
    </button>
  </aside>

  <div class="column">
    <!-- Search bar component mount point -->
    <div id="search_bar_container" class="mb-4"></div>

    <!-- Pagination and status on top-->
    <nav class="level mt-6">
      <nav class="pagination is-rounded level-left mb-0" role="navigation" aria-label="pagination">    
        <ul class="pagination-list">
          <li>
            <span class="pagination-ellipsis">&hellip;</span>
          </li>
        </ul>
      </nav>
      <div class="level-right">
        <p class="image-search-status">...</p>
      </div>
    </nav>

    <!-- Grid with previews of videos -->
    <div id="videos_files_grid_container">
    </div>

    <!-- Pagination and status on bottom-->
    <nav class="pagination is-rounded mt-6" role="navigation" aria-label="pagination">
      <nav class="pagination is-rounded level-left mb-0" role="navigation" aria-label="pagination">    
        <ul class="pagination-list">
          <li>
            <span class="pagination-ellipsis">&hellip;</span>
          </li>
        </ul>
      </nav>
      <div class="level-right">
        <p class="image-search-status">...</p>
      </div>
    </nav>
  </div>

  <!-- Modal container -->
  <div class="modal" id="video-modal">
    <div class="modal-background"></div>
    
    <!-- Modal content that takes up most of the screen -->
    <div class="modal-content" style="width: 95vw; max-height: 95vh; margin: 0 auto; display: flex; align-items: center; justify-content: center;">
      <!-- Video container with responsive sizing -->
      <figure class="image is-16by9" style="width: 100%; max-height: 100%;">
        <video 
          id="modal-video-player"
          class="has-ratio" 
          controls
          preload="metadata"
          playsinline>
          <source src="" type="video/mp4">
          Your browser does not support the video tag.
        </video>
      </figure>
    </div>

    <!--<div id="loading-indicator" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.7); color:white; padding:10px; border-radius:5px; z-index:10;">
      Loading video...
    </div>-->
    
    <!-- Close button -->
    <button class="modal-close is-large" aria-label="close"></button>
  </div>

  <!-- Modal for remote server subscriptions -->
  <div class="modal" id="servers_modal">
    <div class="modal-background modal-close-action"></div>
    <div class="modal-card" style="width:640px">
      <header class="modal-card-head">
        <p class="modal-card-title">Remote Servers</p>
        <button class="delete modal-close-action" aria-label="close"></button>
      </header>
      <section class="modal-card-body">
        <div id="servers_list"></div>
        <hr>
        <h5 class="title is-5">Connect to a new server</h5>
        <div class="field">
          <label class="label">Server URL</label>
          <input class="input" id="server_url_input" type="text" placeholder="http://192.168.1.100:6001">
        </div>
        <div class="field">
          <label class="label">Remote path (leave empty for all files)</label>
          <input class="input" id="server_remote_path_input" type="text" placeholder="Videos/Movies">
        </div>
        <div id="servers_modal_status" class="has-text-danger mt-2"></div>
        <button class="button is-primary mt-2" id="subscribe_server_btn">Connect</button>
      </section>
    </div>
  </div>
