<!-- 
  page.html — Module frontend (REQUIRED)

  This file is injected into base.html via Jinja2:
    {% extends "base.html" %}
    {% block content %}
      ... your HTML here ...
    {% endblock %}

  You do NOT write <html>, <head>, or <body> tags — base.html provides those
  along with the navbar, Bulma CSS, jQuery, Socket.IO client, etc.

  Conventions:
    • Load your JS as an ES module: <script type="module" src="pages/YOUR_MODULE/js/main.js">
    • The global `socket` variable is already available (created in base.html).
    • Use Bulma CSS classes for layout consistency.
    • Mount shared components (SearchBarComponent, FileGridComponent, etc.)
      into placeholder <div> elements.
-->

<!-- Load module JavaScript -->
<script type="module" src="pages/_module_template/js/main.js"></script>

<!-- PAGE MAIN CONTENT -->
<div class="container is-fluid columns is-centered py-6">
  <!-- Optional sidebar -->
  <aside class="column is-2 menu">
    <!-- Sidebar content (folder tree, settings, etc.) -->
  </aside>

  <!-- Main content area -->
  <div class="column">
    <!-- Search bar component mount point -->
    <div id="search_bar_container" class="mb-4"></div>

    <!-- Top pagination + status -->
    <nav class="level mt-6">
      <nav class="pagination is-rounded level-left mb-0" role="navigation" aria-label="pagination">
        <ul class="pagination-list">
          <li><span class="pagination-ellipsis">&hellip;</span></li>
        </ul>
      </nav>
      <div class="level-right">
        <p class="example-search-status">...</p>
      </div>
    </nav>

    <!-- File grid container — FileGridComponent will render items here -->
    <div id="example_grid_container">
    </div>

    <!-- Bottom pagination + status -->
    <nav class="pagination is-rounded mt-6" role="navigation" aria-label="pagination">
      <nav class="pagination is-rounded level-left mb-0" role="navigation" aria-label="pagination">
        <ul class="pagination-list">
          <li><span class="pagination-ellipsis">&hellip;</span></li>
        </ul>
      </nav>
      <div class="level-right">
        <p class="example-search-status">...</p>
      </div>
    </nav>
  </div>
</div>
